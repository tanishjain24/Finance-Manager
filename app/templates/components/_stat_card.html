{# Stat card component #}
<div class="rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <div class="flex items-center justify-between">
    <div>
      <p class="text-sm font-medium text-slate-500 dark:text-slate-400">{{ label }}</p>
      <p class="mt-1 text-2xl font-bold tracking-tight {{ value_class|default('text-slate-900 dark:text-white') }}">
        {{ value }}
      </p>
      {% if subtitle %}
      <p class="mt-1 text-xs text-slate-400">{{ subtitle }}</p>
      {% endif %}
    </div>
    {% if icon %}
    <div class="flex h-12 w-12 items-center justify-center rounded-xl {{ icon_bg|default('bg-emerald-100 dark:bg-emerald-900/30') }}">
      <span class="text-xl">{{ icon }}</span>
    </div>
    {% endif %}
  </div>
</div>

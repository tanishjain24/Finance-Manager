{# Flash message toasts #}
<div id="flash-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
    <div class="flash-toast pointer-events-auto flex items-start gap-3 rounded-xl border px-4 py-3 shadow-lg backdrop-blur-sm
      {% if category == 'error' or category == 'danger' %}border-red-200 bg-red-50 text-red-800 dark:border-red-800 dark:bg-red-950 dark:text-red-200
      {% elif category == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-800 dark:bg-emerald-950 dark:text-emerald-200
      {% elif category == 'warning' %}border-amber-200 bg-amber-50 text-amber-800 dark:border-amber-800 dark:bg-amber-950 dark:text-amber-200
      {% else %}border-slate-200 bg-white text-slate-800 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200{% endif %}">
      <div class="flex-1 text-sm font-medium">{{ message }}</div>
      <button onclick="this.parentElement.remove()" class="text-current opacity-50 hover:opacity-100">&times;</button>
    </div>
    {% endfor %}
  {% endif %}
  {% endwith %}
</div>
